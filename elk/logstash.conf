# Logstash Pipeline for FlowOps
# Input: TCP JSON (from app) + Beats (from Filebeat on Tomcat pods)
# Filter: parse, enrich, tag
# Output: Elasticsearch

input {
  # App direct TCP input (LogstashEncoder in Spring Boot → Logstash TCP appender)
  tcp {
    port => 5000
    codec => json_lines
    tags => ["flowops-app"]
  }

  # Filebeat ships Tomcat access logs
  beats {
    port => 5044
    tags => ["tomcat-access"]
  }
}

filter {

  # ── FlowOps Application Logs ─────────────────────────────────────────────────
  if "flowops-app" in [tags] {
    # Logstash encoder already produces structured JSON; just promote key fields
    mutate {
      rename => {
        "level"       => "log_level"
        "logger_name" => "java_class"
        "thread_name" => "java_thread"
      }
    }

    # Parse trace context for correlation with Jaeger
    if [traceId] {
      mutate {
        add_field => { "trace_url" => "http://jaeger:16686/trace/%{traceId}" }
      }
    }

    # Tag SLA breach log events for dedicated Kibana dashboard
    if [message] =~ /SLA_BREACH/ {
      mutate { add_tag => ["sla-breach"] }
    }

    if [message] =~ /STUCK_WORKFLOW/ {
      mutate { add_tag => ["stuck-workflow"] }
    }

    # Extract caseNumber from MDC or message for easier searching
    grok {
      match => { "message" => "caseNumber=%{DATA:case_number}" }
      tag_on_failure => []
    }
  }

  # ── Tomcat Access Logs (JSON from AccessLogValve) ────────────────────────────
  if "tomcat-access" in [tags] {
    json {
      source => "message"
      target => "tomcat"
    }
    mutate {
      convert => {
        "tomcat.status"   => "integer"
        "tomcat.bytes"    => "integer"
        "tomcat.duration" => "integer"
      }
    }
    # Flag slow requests (>2000ms) for alerting
    if [tomcat][duration] and [tomcat][duration] > 2000 {
      mutate { add_tag => ["slow-request"] }
    }
  }

  # ── Common: Add environment and geo data ────────────────────────────────────
  mutate {
    add_field => {
      "environment" => "dev"
      "application" => "flowops"
    }
  }

  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  # ── Elasticsearch (primary) ──────────────────────────────────────────────────
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "flowops-logs-%{+YYYY.MM.dd}"
    template_name => "flowops-logs"
    template_overwrite => false
  }

  stdout {
    codec => rubydebug
  }
}
