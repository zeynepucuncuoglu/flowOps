apiVersion: v1
kind: Secret
metadata:
  name: flowops-secrets
  namespace: flowops
type: Opaque
# In production, values are injected by Vault Agent or external-secrets-operator.
# This file shows the structure only — never commit real credentials.
stringData:
  DB_USER: "flowops"
  DB_PASSWORD: "flowops_dev_pass"
  JWT_SECRET: "dev-secret-key-not-for-production"
