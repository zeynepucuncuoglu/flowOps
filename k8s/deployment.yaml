apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowops
  namespace: flowops
  labels:
    app: flowops
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flowops
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # allow 1 extra pod during rolling update
      maxUnavailable: 0    # zero-downtime: no pod removed until replacement is healthy
  template:
    metadata:
      labels:
        app: flowops
        version: "1.0.0"
      annotations:
        # Prometheus auto-discovery — scrapes /actuator/prometheus
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: flowops-sa
      containers:
        - name: flowops
          image: flowops:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http

          envFrom:
            - configMapRef:
                name: flowops-config
            - secretRef:
                name: flowops-secrets

          securityContext:
            runAsUser: 0

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1536Mi"

          # Kubernetes health probes backed by Spring Boot Actuator
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 18   # 60 + 18×10s = 3 min max startup

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

